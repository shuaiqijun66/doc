<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Document</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Description">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <link rel="stylesheet" href="custom.css">
</head>
<body>
  <div id="app"></div>
  <button id="back-to-top" title="回到顶部">↑</button>

  <script>
    window.$docsify = {
      name: '',
      repo: '',
      routerMode: 'history',  // 开启历史模式，去掉 # 号
      loadSidebar: true, // 侧边栏
      loadNavbar: true, // 导航
      externalLinkTarget: '_blank', // 新页面打开超链接
       // 主题插件配置（核心）
      darklightTheme: {
        toggle: true,                // 显示切换按钮
        defaultTheme: 'light',        // 默认亮色
        auto: true,                   // 自动跟随系统主题
        createToggle: true,            // 创建切换按钮
        buttonPosition: 'custom',      // 自定义按钮位置
        buttonText: {                  // 按钮提示文字
          light: '🌞 亮色',
          dark: '🌜 暗色'
        }
      },  
      search: 'auto', // 默认值
      hideOtherSidebarContent: false,
            // 搜索插件配置 (支持详细参数)
      search: {
        maxAge: 86400000,             // 缓存一天
        paths: [
        '/',
        '/Documents/',
        '/Documents/HCIE_DateCom',
      ],               // 索引
        placeholder: '搜索文档...',    // 占位符文字
        noData: '没有结果',
        depth: 5,
        hideOtherSidebarContent: false,
        namespace: 'website',          // 避免多项目冲突
      },
    }
  </script>
  <!-- Docsify v4 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-php.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
    <!-- 添加一个小脚本，确保搜索图标容器稳定 -->
  <script src="/JS/search.js"></script>
  <script src="/JS/back_to_top.js"></script>
</body>
<style>

</style>
</html>
